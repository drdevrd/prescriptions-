<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>H.S. Hospital — Prescription</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --ink:#1b2b34;
    --ink-soft:#4a5d68;
    --paper:#f7f5f0;
    --card:#ffffff;
    --line:#e2ddd2;
    --teal:#0f6e63;
    --teal-deep:#0a4f47;
    --amber:#c97b2e;
    --danger:#b3432f;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--paper);
    color:var(--ink);
    padding-bottom:40px;
  }
  header{
    background:var(--teal-deep);
    color:#fff;
    padding:18px 16px 16px;
    position:sticky;
    top:0;
    z-index:10;
  }
  header .crest{
    font-size:11px;
    letter-spacing:.12em;
    text-transform:uppercase;
    opacity:.75;
    margin-bottom:2px;
  }
  header h1{
    margin:0;
    font-size:19px;
    font-weight:700;
    letter-spacing:.01em;
  }
  header .sub{
    font-size:12px;
    opacity:.8;
    margin-top:3px;
  }
  main{
    max-width:640px;
    margin:0 auto;
    padding:16px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:14px;
  }
  .card h2{
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--teal-deep);
    margin:0 0 12px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .card h2 .num{
    width:20px;height:20px;
    border-radius:50%;
    background:var(--teal-deep);
    color:#fff;
    font-size:11px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  label{
    display:block;
    font-size:12.5px;
    color:var(--ink-soft);
    margin-bottom:4px;
    font-weight:600;
  }
  input[type=text], input[type=number], input[type=date], textarea, select{
    width:100%;
    padding:10px 11px;
    border:1.5px solid var(--line);
    border-radius:8px;
    font-size:15px;
    font-family:inherit;
    color:var(--ink);
    background:#fff;
    margin-bottom:12px;
  }
  input:focus, textarea:focus, select:focus{
    outline:none;
    border-color:var(--teal);
  }
  .row2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .row3{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:10px;
  }
  .toggle{
    display:flex;
    background:var(--paper);
    border:1.5px solid var(--line);
    border-radius:8px;
    padding:3px;
    margin-bottom:14px;
  }
  .toggle button{
    flex:1;
    padding:9px;
    border:none;
    background:none;
    border-radius:6px;
    font-size:14px;
    font-weight:600;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .toggle button.active{
    background:var(--teal-deep);
    color:#fff;
  }
  textarea{
    min-height:120px;
    resize:vertical;
    line-height:1.5;
  }
  .rx-row{
    border:1.5px solid var(--line);
    border-radius:8px;
    padding:12px;
    margin-bottom:10px;
    position:relative;
    background:var(--paper);
  }
  .rx-row .grid3{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
    margin-bottom:8px;
  }
  .rx-row .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-bottom:8px;
  }
  .rx-row label{margin-bottom:3px;font-size:11.5px;}
  .rx-row input, .rx-row select{margin-bottom:0;padding:8px 10px;font-size:14px;}
  .rx-row textarea{min-height:42px;margin-bottom:0;padding:8px 10px;font-size:14px;}
  .remove-row{
    position:absolute;
    top:8px; right:8px;
    background:none;
    border:none;
    color:var(--danger);
    font-size:18px;
    line-height:1;
    cursor:pointer;
    padding:2px 6px;
  }
  .add-row{
    width:100%;
    padding:11px;
    border:1.5px dashed var(--teal);
    background:none;
    color:var(--teal-deep);
    border-radius:8px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
  }
  .btn-primary{
    width:100%;
    padding:15px;
    background:var(--teal-deep);
    color:#fff;
    border:none;
    border-radius:9px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    letter-spacing:.01em;
  }
  .btn-primary:disabled{
    background:#9bb3ae;
    cursor:not-allowed;
  }
  .btn-primary:active:not(:disabled){
    transform:translateY(1px);
  }
  .status{
    text-align:center;
    font-size:13.5px;
    color:var(--ink-soft);
    margin-top:10px;
    min-height:18px;
  }
  .status.error{color:var(--danger);font-weight:600;}
  .result{
    display:none;
    background:#eef6f3;
    border:1.5px solid var(--teal);
    border-radius:var(--radius);
    padding:16px;
    text-align:center;
  }
  .result.show{display:block;}
  .result p{
    margin:0 0 12px;
    font-size:13.5px;
    color:var(--teal-deep);
    font-weight:600;
  }
  .link-box{
    display:flex;
    gap:8px;
    margin-bottom:12px;
  }
  .link-box input{
    margin:0;
    font-size:12.5px;
    background:#fff;
  }
  .link-box button{
    padding:0 16px;
    border:none;
    background:var(--teal-deep);
    color:#fff;
    border-radius:8px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    white-space:nowrap;
  }
  .share-row{
    display:flex;
    gap:10px;
  }
  .share-row a, .share-row button{
    flex:1;
    padding:12px;
    border-radius:8px;
    text-decoration:none;
    font-size:14px;
    font-weight:700;
    text-align:center;
    border:none;
    cursor:pointer;
  }
  .share-whatsapp{background:#1f8a5c;color:#fff;}
  .share-new{background:#fff;color:var(--teal-deep);border:1.5px solid var(--teal-deep) !important;}
  .footer-note{
    text-align:center;
    font-size:11.5px;
    color:#9aa6a0;
    margin-top:20px;
    line-height:1.6;
  }
</style>
</head>
<body>

<header>
  <div class="crest">H.S. HOSPITAL · COIMBATORE</div>
  <h1>Prescription</h1>
  <div class="sub">Dr. R. Devaraja, MD (Paediatrics) · Reg. No. 100066</div>
</header>

<main>

  <div class="card">
    <h2><span class="num">1</span>Patient</h2>
    <label for="pname">Patient name</label>
    <input type="text" id="pname" placeholder="Full name">
    <div class="row2">
      <div>
        <label for="page">Age</label>
        <input type="text" id="page" placeholder="e.g. 4 yrs / 8 mo">
      </div>
      <div>
        <label for="pgender">Gender</label>
        <select id="pgender">
          <option value="">Select</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
      </div>
    </div>
    <label for="pdate">Date</label>
    <input type="date" id="pdate">
    <label for="pdiag">Diagnosis / notes <span style="font-weight:400;color:#9aa6a0;">(optional)</span></label>
    <input type="text" id="pdiag" placeholder="e.g. Acute bronchiolitis">
  </div>

  <div class="card">
    <h2><span class="num">2</span>Prescription</h2>
    <div class="toggle">
      <button id="tabQuick" class="active" onclick="setMode('quick')">Quick text</button>
      <button id="tabStruct" onclick="setMode('struct')">Structured</button>
    </div>

    <div id="quickMode">
      <textarea id="quickText" placeholder="Type the prescription freely...&#10;&#10;e.g.&#10;1. Tab. Paracetamol 250mg — 1 tsp TDS x 3 days&#10;2. Syp. Ambrodil — 5ml BD x 5 days"></textarea>
    </div>

    <div id="structMode" style="display:none;">
      <div id="rxRows"></div>
      <button type="button" class="add-row" onclick="addRow()">+ Add medicine</button>
    </div>
  </div>

  <div class="card">
    <h2><span class="num">3</span>Advice <span style="font-weight:400;color:#9aa6a0;text-transform:none;letter-spacing:0;">(optional)</span></h2>
    <textarea id="advice" style="min-height:70px;" placeholder="e.g. Plenty of fluids. Review after 3 days if fever persists."></textarea>
  </div>

  <button class="btn-primary" id="genBtn" onclick="generateAndUpload()">Generate &amp; Get Link</button>
  <div class="status" id="status"></div>

  <div class="result" id="result">
    <p>Prescription ready</p>
    <div class="link-box">
      <input type="text" id="linkOut" readonly>
      <button onclick="copyLink()">Copy</button>
    </div>
    <div class="share-row">
      <a id="waLink" class="share-whatsapp" href="#" target="_blank">Share on WhatsApp</a>
      <button class="share-new" onclick="resetForm()">New Rx</button>
    </div>
  </div>

  <div class="footer-note">H.S. Hospital, 19A Gandhinagar, Kavundampalayam, Coimbatore – 641030<br>0422 2440277 / 2440877 · hshospital@yahoo.com</div>

</main>

<script>
// ---- CONFIG ----
const SUPABASE_URL = "https://ihbbihdjyphngxgoazxt.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImloYmJpaGRqeXBobmd4Z29henh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMzUxMzEsImV4cCI6MjA5MzkxMTEzMX0.0vCyklt_PDLljxXuIbSr19QTmHRh5VU-0PeFHmYkqT4";
const BUCKET = "prescriptions";

let rowCount = 0;

function setMode(mode){
  document.getElementById('tabQuick').classList.toggle('active', mode==='quick');
  document.getElementById('tabStruct').classList.toggle('active', mode==='struct');
  document.getElementById('quickMode').style.display = mode==='quick' ? 'block' : 'none';
  document.getElementById('structMode').style.display = mode==='struct' ? 'block' : 'none';
  if(mode==='struct' && rowCount===0) addRow();
}

function addRow(){
  rowCount++;
  const id = 'row_'+rowCount;
  const div = document.createElement('div');
  div.className = 'rx-row';
  div.id = id;
  div.innerHTML = `
    <button type="button" class="remove-row" onclick="document.getElementById('${id}').remove()">&times;</button>
    <div class="grid3">
      <div>
        <label>Form</label>
        <select class="rx-form">
          <option value="">— Form —</option>
          <option>Tab.</option>
          <option>Syrup</option>
          <option>Ointment</option>
          <option>Drops</option>
          <option>Inj.</option>
          <option>Cap.</option>
          <option>Cream</option>
          <option>Gel</option>
          <option>Powder</option>
          <option>Inhaler</option>
          <option>Suppository</option>
        </select>
      </div>
      <div style="grid-column:span 2">
        <label>Drug name &amp; strength</label>
        <input type="text" class="rx-drug" placeholder="e.g. Paracetamol 250mg / Ambroxol 15mg/5ml">
      </div>
    </div>
    <div class="grid3">
      <div>
        <label>Dose</label>
        <input type="text" class="rx-dose" placeholder="e.g. 5ml / 1 tab">
      </div>
      <div>
        <label>Frequency</label>
        <select class="rx-freq">
          <option value="">— Freq —</option>
          <option value="every 6 hours">Every 6 hrs</option>
          <option value="every 8 hours">Every 8 hrs</option>
          <option value="every 12 hours">Every 12 hrs</option>
          <option value="every 24 hours">Every 24 hrs</option>
          <option value="every 48 hours">Every 48 hrs</option>
          <option value="OD">OD</option>
          <option value="BD">BD</option>
          <option value="TID">TID</option>
          <option value="QID">QID</option>
          <option value="SOS">SOS</option>
          <option value="Stat">Stat</option>
        </select>
      </div>
      <div>
        <label>Duration</label>
        <select class="rx-duration">
          <option value="">— Days —</option>
          <option value="1 day">1 day</option>
          <option value="2 days">2 days</option>
          <option value="3 days">3 days</option>
          <option value="4 days">4 days</option>
          <option value="5 days">5 days</option>
          <option value="7 days">7 days</option>
          <option value="10 days">10 days</option>
          <option value="14 days">14 days</option>
          <option value="21 days">21 days</option>
          <option value="1 month">1 month</option>
          <option value="2 months">2 months</option>
          <option value="3 months">3 months</option>
          <option value="till review">Till review</option>
          <option value="continuous">Continuous</option>
        </select>
      </div>
    </div>
    <div>
      <label>Instructions</label>
      <input type="text" class="rx-instr" placeholder="e.g. After food, Before food, With warm water">
    </div>
  `;
  document.getElementById('rxRows').appendChild(div);
}

function getStructuredLines(){
  const rows = document.querySelectorAll('.rx-row');
  const lines = [];
  rows.forEach(row => {
    const form = row.querySelector('.rx-form').value.trim();
    const drug = row.querySelector('.rx-drug').value.trim();
    const dose = row.querySelector('.rx-dose').value.trim();
    const freq = row.querySelector('.rx-freq').value.trim();
    const dur = row.querySelector('.rx-duration').value.trim();
    const instr = row.querySelector('.rx-instr').value.trim();
    if(drug){
      let line = [form, drug].filter(Boolean).join(' ');
      const middle = [dose, freq].filter(Boolean).join(' ');
      if(middle) line += ' — ' + middle;
      if(dur) line += ' × ' + dur;
      if(instr) line += ' (' + instr + ')';
      lines.push(line);
    }
  });
  return lines;
}

function isQuickMode(){
  return document.getElementById('tabQuick').classList.contains('active');
}

function setStatus(msg, isError){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (isError ? ' error' : '');
}

async function generateAndUpload(){
  const name = document.getElementById('pname').value.trim();
  const age = document.getElementById('page').value.trim();
  const gender = document.getElementById('pgender').value;
  const dateVal = document.getElementById('pdate').value;
  const diag = document.getElementById('pdiag').value.trim();
  const advice = document.getElementById('advice').value.trim();

  if(!name){
    setStatus("Enter the patient's name first.", true);
    document.getElementById('pname').focus();
    return;
  }

  let rxLines = [];
  if(isQuickMode()){
    const txt = document.getElementById('quickText').value.trim();
    if(!txt){
      setStatus("Enter the prescription text.", true);
      return;
    }
    rxLines = txt.split('\n').filter(l => l.trim().length>0);
  } else {
    rxLines = getStructuredLines();
    if(rxLines.length===0){
      setStatus("Add at least one medicine.", true);
      return;
    }
  }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  setStatus("Generating PDF...");

  try{
    const dateStr = dateVal ? formatDate(dateVal) : formatDate(new Date().toISOString().slice(0,10));
    const pdfBlob = buildPDF({name, age, gender, dateStr, diag, rxLines, advice});

    setStatus("Uploading...");
    const fileName = `rx_${Date.now()}_${slugify(name)}.pdf`;
    const uploadUrl = `${SUPABASE_URL}/storage/v1/object/${BUCKET}/${fileName}`;

    const res = await fetch(uploadUrl, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        'apikey': SUPABASE_ANON_KEY,
        'Content-Type': 'application/pdf'
      },
      body: pdfBlob
    });

    if(!res.ok){
      const errText = await res.text();
      throw new Error(`Upload failed (${res.status}): ${errText}`);
    }

    const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${fileName}`;
    showResult(publicUrl, name);
    setStatus("");
  } catch(err){
    console.error(err);
    setStatus("Something went wrong: " + err.message, true);
  } finally {
    btn.disabled = false;
  }
}

function slugify(str){
  return str.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'').slice(0,30) || 'patient';
}

function formatDate(isoStr){
  const d = new Date(isoStr + 'T00:00:00');
  const day = String(d.getDate()).padStart(2,'0');
  const month = d.toLocaleString('en-GB', {month:'short'});
  const year = d.getFullYear();
  return `${day} ${month} ${year}`;
}

function buildPDF({name, age, gender, dateStr, diag, rxLines, advice}){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'pt', format:'a4'});
  const pageWidth = doc.internal.pageSize.getWidth();
  const margin = 50;
  let y = 50;

  // Letterhead
  doc.setFont('helvetica','bold');
  doc.setFontSize(16);
  doc.setTextColor(15,110,99);
  doc.text('H.S. HOSPITAL', margin, y);
  y += 16;
  doc.setFontSize(9.5);
  doc.setFont('helvetica','normal');
  doc.setTextColor(80,80,80);
  doc.text('19A Gandhinagar, Kavundampalayam, Coimbatore - 641030', margin, y);
  y += 12;
  doc.text('Ph: 0422 2440277 / 2440877  |  hshospital@yahoo.com', margin, y);
  y += 18;
  doc.setDrawColor(15,110,99);
  doc.setLineWidth(1.2);
  doc.line(margin, y, pageWidth-margin, y);
  y += 20;

  // Doctor line
  doc.setFont('helvetica','bold');
  doc.setFontSize(11);
  doc.setTextColor(30,40,45);
  doc.text('Dr. R. Devaraja, MD (Paediatrics)', margin, y);
  doc.setFont('helvetica','normal');
  doc.setFontSize(9.5);
  doc.setTextColor(100,100,100);
  doc.text('Consultant Paediatrician  |  Reg. No. 100066', margin, y+12);
  y += 34;

  // Patient block
  doc.setDrawColor(220,220,220);
  doc.setLineWidth(0.7);
  doc.line(margin, y, pageWidth-margin, y);
  y += 18;

  doc.setFont('helvetica','bold');
  doc.setFontSize(10.5);
  doc.setTextColor(30,40,45);
  doc.text('Patient:', margin, y);
  doc.setFont('helvetica','normal');
  doc.text(name, margin+55, y);

  doc.setFont('helvetica','bold');
  doc.text('Date:', pageWidth-margin-140, y);
  doc.setFont('helvetica','normal');
  doc.text(dateStr, pageWidth-margin-105, y);
  y += 16;

  if(age || gender){
    doc.setFont('helvetica','bold');
    doc.text('Age / Gender:', margin, y);
    doc.setFont('helvetica','normal');
    const ageGenderStr = [age, gender].filter(Boolean).join(' / ');
    doc.text(ageGenderStr, margin+85, y);
    y += 16;
  }
  if(diag){
    doc.setFont('helvetica','bold');
    doc.text('Diagnosis:', margin, y);
    doc.setFont('helvetica','normal');
    const diagLines = doc.splitTextToSize(diag, pageWidth-margin*2-75);
    doc.text(diagLines, margin+75, y);
    y += 14*diagLines.length;
  }
  y += 10;

  doc.setDrawColor(220,220,220);
  doc.line(margin, y, pageWidth-margin, y);
  y += 26;

  // Rx symbol
  doc.setFont('helvetica','bolditalic');
  doc.setFontSize(20);
  doc.setTextColor(15,110,99);
  doc.text('Rx', margin, y);
  y += 22;

  // Medicines
  doc.setFont('helvetica','normal');
  doc.setFontSize(11.5);
  doc.setTextColor(30,40,45);
  rxLines.forEach((line, idx) => {
    const wrapped = doc.splitTextToSize(`${idx+1}.  ${line}`, pageWidth-margin*2-10);
    if(y > 720){ doc.addPage(); y = 50; }
    doc.text(wrapped, margin+10, y);
    y += 17*wrapped.length + 6;
  });

  // Advice
  if(advice){
    y += 10;
    doc.setDrawColor(220,220,220);
    doc.line(margin, y, pageWidth-margin, y);
    y += 18;
    doc.setFont('helvetica','bold');
    doc.setFontSize(10.5);
    doc.text('Advice:', margin, y);
    y += 15;
    doc.setFont('helvetica','normal');
    doc.setFontSize(10.5);
    const adviceLines = doc.splitTextToSize(advice, pageWidth-margin*2);
    doc.text(adviceLines, margin, y);
    y += 14*adviceLines.length;
  }

  // E-signature
  const pageHeight2 = doc.internal.pageSize.getHeight();
  let sigY = Math.max(y + 40, pageHeight2 - 90);
  if(sigY > pageHeight2 - 60){ doc.addPage(); sigY = 100; }
  doc.setDrawColor(180,180,180);
  doc.setLineWidth(0.6);
  doc.line(pageWidth-margin-160, sigY, pageWidth-margin, sigY);
  doc.setFont('helvetica','italic');
  doc.setFontSize(13);
  doc.setTextColor(15,110,99);
  doc.text('Dr. R. Devaraja', pageWidth-margin-145, sigY-6);
  doc.setFont('helvetica','normal');
  doc.setFontSize(9);
  doc.setTextColor(100,100,100);
  doc.text('(e-signature)', pageWidth-margin-145, sigY+12);
  doc.text('Reg. No. 100066', pageWidth-margin-145, sigY+24);

  // Footer
  const pageHeight = doc.internal.pageSize.getHeight();
  doc.setFontSize(8.5);
  doc.setTextColor(150,150,150);
  doc.text('Generated via H.S. Hospital digital prescription system', margin, pageHeight-30);

  return doc.output('blob');
}

function showResult(url, name){
  document.getElementById('linkOut').value = url;
  document.getElementById('waLink').href = `https://wa.me/?text=${encodeURIComponent('Prescription for ' + name + ': ' + url)}`;
  document.getElementById('result').classList.add('show');
  document.getElementById('result').scrollIntoView({behavior:'smooth', block:'center'});
}

function copyLink(){
  const input = document.getElementById('linkOut');
  input.select();
  input.setSelectionRange(0, 99999);
  navigator.clipboard.writeText(input.value).then(() => {
    setStatus("Link copied.");
  }).catch(() => {
    document.execCommand('copy');
  });
}

function resetForm(){
  document.getElementById('pname').value='';
  document.getElementById('page').value='';
  document.getElementById('pgender').value='';
  document.getElementById('pdate').value='';
  document.getElementById('pdiag').value='';
  document.getElementById('advice').value='';
  document.getElementById('quickText').value='';
  document.getElementById('rxRows').innerHTML='';
  rowCount = 0;
  setMode('quick');
  document.getElementById('result').classList.remove('show');
  setStatus('');
  window.scrollTo({top:0, behavior:'smooth'});
}

// init
document.getElementById('pdate').valueAsDate = new Date();
</script>
